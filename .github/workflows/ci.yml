name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-vet-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt (fail on unformatted files)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (1/2)
        run: go test ./... -count=1

      - name: go test (2/2, determinism check)
        run: go test ./... -count=1
